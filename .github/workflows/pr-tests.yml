name: PR Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - release

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-tests-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  paths-filter:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      lambda: ${{ steps.filter.outputs.lambda }}
      agents: ${{ steps.filter.outputs.agents }}
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            lambda:
              - 'cdk/lambda/**'
            agents:
              - 'agents/**'
              - 'evaluation/**'
              - 'mcp-server/**'
            ui:
              - 'ui/**'

  cdk-synth:
    name: cdk-synth
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'cdk/package-lock.json'

      - name: Install dependencies
        working-directory: cdk/
        run: npm ci

      - name: Build TypeScript
        working-directory: cdk/
        run: npm run build

      - name: CDK Synth
        working-directory: cdk/
        run: npx cdk synth --no-lookups

      - name: Upload cdk.out artifact
        uses: actions/upload-artifact@v4
        with:
          name: cdk-synth-output
          path: cdk/cdk.out/

  lint-format:
    name: lint-format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'cdk/package-lock.json'

      - name: Setup Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install CDK dependencies
        working-directory: cdk/
        run: npm ci
        timeout-minutes: 10

      - name: CDK ESLint
        working-directory: cdk/
        run: npm run lint
        timeout-minutes: 10

      - name: UI ESLint
        run: |
          for dir in ui/*/; do
            if [ -f "$dir/package.json" ] && grep -q '"lint"' "$dir/package.json"; then
              echo "Running lint in $dir"
              cd "$dir"
              npm ci
              npm run lint
              cd "$GITHUB_WORKSPACE"
            fi
          done
        timeout-minutes: 10

      - name: Python Ruff
        run: pip install ruff && ruff check cdk/lambda/ agents/
        timeout-minutes: 10

  cdk-tests:
    name: cdk-tests
    needs: [cdk-synth]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: cdk/
        run: npm ci

      - name: Build TypeScript
        working-directory: cdk/
        run: npm run build

      - name: Run tests
        working-directory: cdk/
        run: npm test

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report-cdk-tests
          path: cdk/junit.xml
          retention-days: 14

  infra-static-check:
    name: infra-static-check
    needs: [cdk-synth]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: cdk/
        run: npm ci

      - name: Build TypeScript
        working-directory: cdk/
        run: npm run build

      - name: CDK Synth with cdk-nag
        working-directory: cdk/
        run: npx cdk synth --no-lookups -c nagEnabled=true 2>&1 | tee nag-output.txt

      - name: Check for errors
        working-directory: cdk/
        run: |
          if grep -q '\[Error\]' nag-output.txt; then
            echo "::error::cdk-nag found unsuppressed Error-level findings"
            cat nag-output.txt
            exit 1
          fi

      - name: Upload nag output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: infra-static-findings
          path: cdk/nag-output.txt
          retention-days: 14

  lambda-tests:
    name: lambda-tests
    needs: [paths-filter]
    if: needs.paths-filter.outputs.lambda == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install test dependencies
        run: pip install pytest pytest-timeout moto boto3 aws-lambda-powertools

      - name: Install per-Lambda requirements
        run: |
          for req in cdk/lambda/*/requirements.txt; do
            if [ -f "$req" ]; then
              echo "Installing $req"
              pip install -r "$req"
            fi
          done

      - name: Run Lambda tests
        run: pytest cdk/lambda/ --timeout=60 --junitxml=junit-lambda.xml -v

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report-lambda-tests
          path: junit-lambda.xml
          retention-days: 14

  agent-tests:
    name: agent-tests
    needs: [paths-filter]
    if: needs.paths-filter.outputs.agents == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install agent dependencies
        run: |
          pip install pytest pytest-timeout httpx botocore boto3 starlette uvicorn fastapi

      - name: Install remaining agent deps (best-effort)
        continue-on-error: true
        run: pip install -r agents/langgraph/requirements.txt -r agents/strands/requirements.txt 2>/dev/null || true

      - name: Run agent tests
        run: |
          pytest agents/langgraph/ --timeout=60 --junitxml=junit-agents-langgraph.xml -v
          pytest agents/strands/ --timeout=60 --junitxml=junit-agents-strands.xml -v

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report-agent-tests
          path: junit-agents-*.xml
          retention-days: 14

  ui-tests:
    name: ui-tests
    needs: [paths-filter]
    if: needs.paths-filter.outputs.ui == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Test chatbot
        working-directory: ui/chatbot/
        run: |
          npm ci
          npm test

      - name: Test device-simulator
        working-directory: ui/device-simulator/
        run: |
          npm ci
          npm test

      - name: Test admin-console
        working-directory: ui/admin-console/
        run: |
          npm ci
          npm test

  agent-evaluation:
    name: agent-evaluation
    needs: [paths-filter]
    if: needs.paths-filter.outputs.agents == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: gha-pr-evaluation

      - name: Setup Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install agent dependencies (langgraph)
        working-directory: agents/langgraph
        run: |
          python -m venv .venv
          .venv/bin/pip install --quiet -r requirements.txt

      - name: Install agent dependencies (strands)
        working-directory: agents/strands
        run: |
          python -m venv .venv
          .venv/bin/pip install --quiet -r requirements.txt

      - name: Install MCP server dependencies
        working-directory: mcp-server
        run: |
          python -m venv .venv
          .venv/bin/pip install --quiet -r requirements.txt

      - name: Install API shim dependencies
        working-directory: local/api
        run: |
          python -m venv .venv
          .venv/bin/pip install --quiet -r requirements.txt 2>/dev/null || true

      - name: Install evaluation dependencies
        working-directory: evaluation
        run: |
          python -m venv .venv
          .venv/bin/pip install --quiet -r requirements.txt

      - name: Start DynamoDB Local
        run: |
          docker run -d --name eval-dynamodb -p 8001:8000 amazon/dynamodb-local:latest
          sleep 2

      - name: Seed DynamoDB
        run: |
          cd local
          bash scripts/init-ddb.sh || true
          bash scripts/seed-ddb.sh || true

      - name: Start API shim
        working-directory: local/api
        run: |
          DYNAMODB_ENDPOINT=http://localhost:8001 \
            .venv/bin/python -m uvicorn app:app --host 0.0.0.0 --port 8000 &
          sleep 2

      - name: Start MCP Server
        working-directory: mcp-server
        run: |
          API_URL=http://localhost:8000 MCP_PORT=8083 \
            .venv/bin/python -m uvicorn server:mcp.app --host 0.0.0.0 --port 8083 &
          sleep 2

      - name: Start LangGraph agent
        working-directory: agents/langgraph
        run: |
          MCP_SERVER_URL=http://localhost:8083/mcp \
            .venv/bin/python -m uvicorn server:app --host 0.0.0.0 --port 8081 &

      - name: Start Strands agent
        working-directory: agents/strands
        run: |
          MCP_SERVER_URL=http://localhost:8083/mcp \
            .venv/bin/python -m uvicorn server:app --host 0.0.0.0 --port 8082 &

      - name: Wait for agents
        run: |
          for port in 8081 8082; do
            for i in $(seq 1 30); do
              if curl -fsS -o /dev/null "http://localhost:$port/ping" 2>/dev/null; then
                echo "Agent on :$port ready"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "::error::Agent on :$port failed to start"
                exit 1
              fi
              sleep 1
            done
          done

      - name: Run evaluation
        working-directory: evaluation
        run: |
          .venv/bin/python runner.py \
            --dataset datasets/comparative.yaml \
            --output results/ci-run.json

      - name: Run LLM-as-judge
        working-directory: evaluation
        run: |
          .venv/bin/python judge.py \
            results/ci-run.json \
            --threshold 0.7 \
            --fail-on-regression

      - name: Upload evaluation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-results
          path: |
            evaluation/results/ci-run.json
            evaluation/results/ci-run-judged.json
          retention-days: 14

  aggregate-status:
    name: aggregate-status
    if: always()
    needs:
      - cdk-synth
      - cdk-tests
      - infra-static-check
      - lint-format
      - lambda-tests
      - agent-tests
      - ui-tests
      - agent-evaluation
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check outcomes
        run: |
          results=("${{ needs.cdk-synth.result }}" \
                   "${{ needs.cdk-tests.result }}" \
                   "${{ needs.infra-static-check.result }}" \
                   "${{ needs.lint-format.result }}" \
                   "${{ needs.lambda-tests.result }}" \
                   "${{ needs.agent-tests.result }}" \
                   "${{ needs.ui-tests.result }}" \
                   "${{ needs.agent-evaluation.result }}")
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "::error::One or more jobs failed or were cancelled: $r"
              exit 1
            fi
          done
          echo "All jobs passed or were skipped."
