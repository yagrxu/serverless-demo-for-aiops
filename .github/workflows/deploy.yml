name: Deploy to AWS

on:
  push:
    branches:
      - test
      - release
  workflow_dispatch:
    inputs:
      target:
        description: "Target environment"
        required: true
        type: choice
        options:
          - test
          - release
      force_all:
        description: "Rebuild/deploy everything regardless of diff"
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  resolve:
    name: Resolve target
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.pick.outputs.environment }}
    steps:
      - id: pick
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ inputs.target }}" >> "$GITHUB_OUTPUT"
          else
            echo "environment=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

  stack_health:
    name: Check stack health
    needs: resolve
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve.outputs.environment }}
    permissions:
      id-token: write
      contents: read
    outputs:
      needs_recovery: ${{ steps.check.outputs.needs_recovery }}
      bad_stacks:     ${{ steps.check.outputs.bad_stacks }}
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: gha-stack-health

      - id: check
        name: Query CloudFormation stack statuses
        env:
          PROJECT_NAME: aiops-cat-demo
        run: |
          # Any stack status in this set means the previous deploy left
          # the stack in an incomplete or rolled-back state. CloudFormation
          # will refuse meaningful updates until we retry, so we force a
          # full redeploy regardless of code diff.
          BAD_STATES="CREATE_FAILED|ROLLBACK_COMPLETE|ROLLBACK_FAILED|UPDATE_ROLLBACK_COMPLETE|UPDATE_ROLLBACK_FAILED|UPDATE_FAILED|IMPORT_ROLLBACK_COMPLETE|IMPORT_ROLLBACK_FAILED"

          # Fetch every stack whose name starts with the project prefix.
          # --no-paginate is safe here; we have <10 stacks.
          stacks_json=$(aws cloudformation list-stacks \
            --region us-east-1 \
            --stack-status-filter CREATE_COMPLETE CREATE_FAILED ROLLBACK_COMPLETE ROLLBACK_FAILED \
              UPDATE_COMPLETE UPDATE_FAILED UPDATE_ROLLBACK_COMPLETE UPDATE_ROLLBACK_FAILED \
              IMPORT_COMPLETE IMPORT_ROLLBACK_COMPLETE IMPORT_ROLLBACK_FAILED \
            --query "StackSummaries[?starts_with(StackName, \`${PROJECT_NAME}\`)].[StackName,StackStatus]" \
            --output text)

          bad=""
          while IFS=$'\t' read -r name status; do
            [ -z "$name" ] && continue
            echo "  $name → $status"
            if echo "$status" | grep -qE "^(${BAD_STATES})\$"; then
              bad="$bad $name"
            fi
          done <<< "$stacks_json"

          if [ -n "$bad" ]; then
            echo ""
            echo "!! Found stacks in failed/rollback state:$bad"
            echo "   Will force a full redeploy to recover."
            echo "needs_recovery=true" >> "$GITHUB_OUTPUT"
            echo "bad_stacks=$bad" >> "$GITHUB_OUTPUT"
          else
            echo ""
            echo ">> All stacks healthy."
            echo "needs_recovery=false" >> "$GITHUB_OUTPUT"
            echo "bad_stacks=" >> "$GITHUB_OUTPUT"
          fi

  changes:
    name: Detect changes
    needs: [resolve, stack_health]
    runs-on: ubuntu-latest
    outputs:
      cdk:        ${{ steps.filter.outputs.cdk }}
      lambda:     ${{ steps.filter.outputs.lambda }}
      chatbot:    ${{ steps.filter.outputs.chatbot }}
      langgraph:  ${{ steps.filter.outputs.langgraph }}
      strands:    ${{ steps.filter.outputs.strands }}
      mcp_server: ${{ steps.filter.outputs.mcp_server }}
      trafgen:    ${{ steps.filter.outputs.trafgen }}
      first_run:  ${{ steps.firstrun.outputs.first_run }}
      force_all:  ${{ steps.firstrun.outputs.force_all }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: firstrun
        env:
          BEFORE: ${{ github.event.before }}
          FORCE: ${{ inputs.force_all }}
          RECOVERY: ${{ needs.stack_health.outputs.needs_recovery }}
        run: |
          # force_all = true when the dispatch asked for it OR when any
          # aiops-cat-demo-* stack is in a failed/rollback state.
          if [ "${FORCE}" = "true" ] || [ "${RECOVERY}" = "true" ]; then
            echo "force_all=true" >> "$GITHUB_OUTPUT"
            if [ "${RECOVERY}" = "true" ]; then
              echo ">> stack_health reported recovery needed; forcing full redeploy."
            fi
          else
            echo "force_all=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -z "${BEFORE}" ] || [ "${BEFORE}" = "0000000000000000000000000000000000000000" ]; then
            echo "first_run=true" >> "$GITHUB_OUTPUT"
          else
            if git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
              echo "first_run=false" >> "$GITHUB_OUTPUT"
            else
              echo "first_run=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.event.before }}
          filters: |
            cdk:
              - 'cdk/bin/**'
              - 'cdk/lib/**'
              - 'cdk/package.json'
              - 'cdk/package-lock.json'
              - 'cdk/tsconfig.json'
              - 'cdk/cdk.json'
            lambda:
              - 'cdk/lambda/**'
            chatbot:
              - 'ui/chatbot/**'
            langgraph:
              - 'agents/langgraph/**'
            strands:
              - 'agents/strands/**'
            mcp_server:
              - 'mcp-server/**'
            trafgen:
              - 'trafgen/**'

  deploy:
    name: CDK Deploy (${{ needs.resolve.outputs.environment }})
    needs: [resolve, changes]
    runs-on: ubuntu-24.04-arm
    environment: ${{ needs.resolve.outputs.environment }}
    timeout-minutes: 45

    env:
      AWS_REGION: us-east-1
      PROJECT_NAME: aiops-cat-demo
      FIRST_RUN:    ${{ needs.changes.outputs.first_run }}
      FORCE_ALL:    ${{ needs.changes.outputs.force_all }}
      CHG_CDK:      ${{ needs.changes.outputs.cdk }}
      CHG_LAMBDA:   ${{ needs.changes.outputs.lambda }}
      CHG_CHATBOT:  ${{ needs.changes.outputs.chatbot }}
      CHG_LANGGRAPH: ${{ needs.changes.outputs.langgraph }}
      CHG_STRANDS:  ${{ needs.changes.outputs.strands }}
      CHG_TRAFGEN:  ${{ needs.changes.outputs.trafgen }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cdk/package-lock.json

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-${{ needs.resolve.outputs.environment }}-deploy

      - name: Verify AWS identity
        id: aws
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"

      - name: CDK Bootstrap (idempotent)
        working-directory: cdk
        run: |
          if aws ssm get-parameter --name /cdk-bootstrap/hnb659fds/version --region "$AWS_REGION" >/dev/null 2>&1; then
            echo ">> Environment already bootstrapped — skipping"
          else
            echo ">> Bootstrapping aws://${{ steps.aws.outputs.account }}/${{ env.AWS_REGION }}"
            npx cdk bootstrap "aws://${{ steps.aws.outputs.account }}/${{ env.AWS_REGION }}"
          fi

      - name: Summarize change detection
        run: |
          echo "first_run=$FIRST_RUN  force_all=$FORCE_ALL"
          echo "cdk=$CHG_CDK  lambda=$CHG_LAMBDA  chatbot=$CHG_CHATBOT"
          echo "langgraph=$CHG_LANGGRAPH  strands=$CHG_STRANDS"

      - name: Install CDK dependencies
        working-directory: cdk
        run: npm ci

      - name: Build CDK
        working-directory: cdk
        run: npm run build

      # ===================================================================
      # Phase 1: Non-agent infrastructure stacks (ECR, Data, API, Gateway)
      # We do NOT pass `-c skipAgents=true` here. When the flag is true,
      # app.ts skips constructing AgentStack entirely, which makes the
      # ECR exports look unused and CDK tries to delete them — breaking
      # the second and later runs because the live AgentStack in AWS is
      # still referencing those exports. Instead, construct every stack
      # at synth time and let `cdk deploy` only deploy the ones we name.
      #
      # Observability_Stack is intentionally NOT in this phase: it
      # depends on UiStack (CloudFront 5xx alarm 6.10) and on AgentStack
      # being deployed before its dashboards reference real runtime log
      # groups. It deploys in Phase 4 after Fargate + UI.
      # ===================================================================
      - name: "Phase 1: Deploy infrastructure stacks"
        if: >-
          env.FIRST_RUN == 'true' || env.FORCE_ALL == 'true' ||
          env.CHG_CDK == 'true' || env.CHG_LAMBDA == 'true' || env.CHG_CHATBOT == 'true'
        working-directory: cdk
        run: |
          npx cdk deploy \
            ${PROJECT_NAME}-ecr \
            ${PROJECT_NAME}-data \
            ${PROJECT_NAME}-api \
            ${PROJECT_NAME}-gateway \
            --require-approval never \
            -c imageTag=${{ github.sha }} \
            -c trafgenEnabled=true

      # ===================================================================
      # Phase 2: Build and push Docker images
      # ===================================================================
      - name: ECR login
        if: >-
          env.FIRST_RUN == 'true' || env.FORCE_ALL == 'true' || env.CHG_CDK == 'true' ||
          env.CHG_LANGGRAPH == 'true' || env.CHG_STRANDS == 'true' || env.CHG_CHATBOT == 'true' || env.CHG_TRAFGEN == 'true'
        run: |
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin \
              "${{ steps.aws.outputs.account }}.dkr.ecr.${AWS_REGION}.amazonaws.com"

      - name: "Build and push: langgraph"
        if: env.FIRST_RUN == 'true' || env.FORCE_ALL == 'true' || env.CHG_LANGGRAPH == 'true'
        env:
          ACCOUNT_ID: ${{ steps.aws.outputs.account }}
          SHA: ${{ github.sha }}
        run: |
          repo="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${PROJECT_NAME}-langgraph"
          docker buildx build --platform linux/arm64 \
            --tag "${repo}:${SHA}" --tag "${repo}:latest" --push agents/langgraph

      - name: "Build and push: strands"
        if: env.FIRST_RUN == 'true' || env.FORCE_ALL == 'true' || env.CHG_STRANDS == 'true'
        env:
          ACCOUNT_ID: ${{ steps.aws.outputs.account }}
          SHA: ${{ github.sha }}
        run: |
          repo="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${PROJECT_NAME}-strands"
          docker buildx build --platform linux/arm64 \
            --tag "${repo}:${SHA}" --tag "${repo}:latest" --push agents/strands

      - name: "Build and push: chatbot"
        if: env.FIRST_RUN == 'true' || env.FORCE_ALL == 'true' || env.CHG_CHATBOT == 'true'
        env:
          ACCOUNT_ID: ${{ steps.aws.outputs.account }}
          SHA: ${{ github.sha }}
        run: |
          repo="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${PROJECT_NAME}-chatbot"
          docker buildx build --platform linux/arm64 \
            --tag "${repo}:${SHA}" --tag "${repo}:latest" --push ui/chatbot

      - name: "Build and push: trafgen"
        if: env.FIRST_RUN == 'true' || env.FORCE_ALL == 'true' || env.CHG_TRAFGEN == 'true'
        env:
          ACCOUNT_ID: ${{ steps.aws.outputs.account }}
          SHA: ${{ github.sha }}
        run: |
          repo="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${PROJECT_NAME}-trafgen"
          docker buildx build --platform linux/arm64 \
            --tag "${repo}:${SHA}" --tag "${repo}:latest" --push trafgen

      # Retag unchanged images to this SHA so all stacks can use the same imageTag
      - name: Retag unchanged images
        if: >-
          env.FIRST_RUN != 'true' && env.FORCE_ALL != 'true' && (
            env.CHG_LANGGRAPH == 'true' || env.CHG_STRANDS == 'true' || env.CHG_CHATBOT == 'true'
          )
        env:
          ACCOUNT_ID: ${{ steps.aws.outputs.account }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          retag() {
            local name=$1 changed=$2
            if [ "$changed" = "true" ]; then return 0; fi
            local repo="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${PROJECT_NAME}-${name}"
            echo ">> Retagging ${name}:latest → :${SHA}"
            docker buildx imagetools create --tag "${repo}:${SHA}" "${repo}:latest"
          }
          retag langgraph "$CHG_LANGGRAPH"
          retag strands   "$CHG_STRANDS"
          retag chatbot   "$CHG_CHATBOT"

      # ===================================================================
      # Phase 3: Deploy agents (most-frequently-changing stack — pulled
      # out so a pure agent code change skips fargate/ui/observability).
      # ===================================================================
      - name: "Phase 3: Deploy agents"
        if: >-
          env.FIRST_RUN == 'true' || env.FORCE_ALL == 'true' || env.CHG_CDK == 'true' ||
          env.CHG_LANGGRAPH == 'true' || env.CHG_STRANDS == 'true'
        working-directory: cdk
        run: |
          npx cdk deploy \
            ${PROJECT_NAME}-agents \
            --require-approval never \
            -c imageTag=${{ github.sha }} \
            -c trafgenEnabled=true

      # ===================================================================
      # Phase 4: Deploy fargate + UI + observability.
      # Observability_Stack must come after UiStack because alarm 6.10
      # references the CloudFront distribution. Fargate also needs the
      # runtime ARNs from AgentStack (Phase 3) when deployAgents=true.
      # ===================================================================
      - name: "Phase 4: Deploy fargate + UI + observability + trafgen"
        if: >-
          env.FIRST_RUN == 'true' || env.FORCE_ALL == 'true' || env.CHG_CDK == 'true' ||
          env.CHG_LAMBDA == 'true' || env.CHG_CHATBOT == 'true' ||
          env.CHG_LANGGRAPH == 'true' || env.CHG_STRANDS == 'true' || env.CHG_TRAFGEN == 'true'
        working-directory: cdk
        run: |
          npx cdk deploy \
            ${PROJECT_NAME}-fargate \
            ${PROJECT_NAME}-ui \
            ${PROJECT_NAME}-observability \
            ${PROJECT_NAME}-trafgen \
            --require-approval never \
            -c imageTag=${{ github.sha }} \
            -c trafgenEnabled=true
